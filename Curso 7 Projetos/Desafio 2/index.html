<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Desafio 2</title>
</head>
<body>
    <div class="container">
    <h1>Anunciar Item</h1>
    <form id="formAnuncio">
        <label for="nome">Nome do Produto</label>
        <input type="text" id="nome" placeholder="Ex: Celular Samsung">

        <label for="tipo">Tipo de Produto</label>
        <select id="tipo">
            <option disabled selected>Selecione o tipo</option>
            <option>Eletrônico</option>
            <option>Roupas</option>
            <option>Alimento</option>
            <option>Móveis</option>
        </select>

        <label for="preco">Preço</label>
        <input type="number" id="preco" placeholder="R$ 299">

        <label for="descricao">Descrição:</label>
        <input type="text" name="descricao" id="descricao">

        <label for="vendedor">Nome do Vendedor</label>
        <input type="text" id="vendedor" placeholder="Ex: João Silva">

        <label for="contato">Contato</label>
        <input type="text" name="contato" id="contato" placeholder="Ex:(99)99999-9999">

        <button type="submit" id="anunciar">Anunciar</button>
    </form>
    <div id="res"></div>

</div>

    <script src="index.js"></script>
</body>
</html>
